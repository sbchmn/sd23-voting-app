<!DOCTYPE html>
<html>
<head>
    <title>SD23 Convention Live Results</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
    <meta http-equiv="refresh" content="15">
    <style>
        .result-card {
            margin-bottom: 2rem;
        }
        .result-card .card-header {
            padding: 0.75rem 1.25rem;
        }
        canvas {
            max-height: 160px !important;
        }
        @media (max-width: 768px) {
            canvas {
                max-height: 200px !important; /* a bit taller on phones */
            }
        }
    </style>
</head>
<body class="container mt-4">
    <h1 class="text-center mb-4">🔴 SD23 Senate District Convention – Live Voting Results</h1>
    
    {% for pid, poll in polls.items() %}
    <div class="card result-card shadow">
        <div class="card-header bg-primary text-white">
            <h4 class="mb-0">{{ poll.Title }}</h4>
            <small class="opacity-75">{{ poll.Description }}</small>
        </div>
        <div class="card-body p-3">
            <canvas id="chart-{{ pid }}" height="160"></canvas>
        </div>
    </div>
    {% endfor %}

    <script>
        {% for pid, poll in polls.items() %}
        new Chart(document.getElementById('chart-{{ pid }}'), {
            type: 'bar',
            data: {
                labels: Object.keys({{ results[pid]|tojson }}),
                datasets: [{
                    label: 'Weighted Votes',
                    data: Object.values({{ results[pid]|tojson }}),
                    backgroundColor: '#0d6efd'
                }]
            },
            options: {
                scales: {
                    y: {
                        beginAtZero: true,
                        ticks: { stepSize: 1 }
                    }
                },
                plugins: {
                    legend: { display: false }
                }
            }
        });
        {% endfor %}
    </script>
    
    <p class="text-center text-muted mt-4">Auto-refreshes every 15 seconds • Last updated just now</p>
</body>
</html>
