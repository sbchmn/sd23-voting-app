<!DOCTYPE html>
<html>
<head>
    <title>SD23 Convention Live Results</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
    <meta http-equiv="refresh" content="15">
</head>
<body class="container mt-5">
    <h1 class="text-center mb-4">🔴 SD23 Senate District Convention – Live Voting Results</h1>
    {% for pid, poll in polls.items() %}
    <div class="card mb-5 shadow">
        <div class="card-header bg-primary text-white">
            <h4>{{ poll.Title }}</h4>
            <small>{{ poll.Description }}</small>
        </div>
        <div class="card-body">
            <canvas id="chart-{{ pid }}" height="220"></canvas>
        </div>
    </div>
    <script>
        new Chart(document.getElementById('chart-{{ pid }}'), {
            type: 'bar',
            data: {
                labels: Object.keys({{ results[pid]|tojson }}),
                datasets: [{ label: 'Weighted Votes', data: Object.values({{ results[pid]|tojson }}), backgroundColor: '#0d6efd' }]
            },
            options: { scales: { y: { beginAtZero: true, ticks: { stepSize: 1 } } } }
        });
    </script>
    {% endfor %}
    <p class="text-center text-muted">Auto-refreshes every 15 seconds</p>
</body>
</html>
