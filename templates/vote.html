<!DOCTYPE html>
<html>
<head>
    <title>Cast Your Vote – SD23</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container mt-5">
<!-- Toast container -->
<div class="toast-container position-fixed bottom-0 end-0 p-3" style="z-index: 1100;">
    {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
            {% for category, message in messages %}
            <div class="toast align-items-center text-white bg-{{ 'success' if category == 'success' else 'danger' if category == 'danger' else 'warning' if category == 'warning' else 'info' }} border-0" role="alert" aria-live="assertive" aria-atomic="true">
                <div class="d-flex">
                    <div class="toast-body">{{ message }}</div>
                    <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"></button>
                </div>
            </div>
            {% endfor %}
        {% endif %}
    {% endwith %}
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
    // Auto-show all toasts
    document.addEventListener('DOMContentLoaded', function () {
        var toasts = document.querySelectorAll('.toast');
        toasts.forEach(function (toast) {
            new bootstrap.Toast(toast, { delay: 6000 }).show();
        });
    });
</script>
    <h2 class="mb-4">🗳️ SD23 Delegate Voting Portal</h2>
    <form method="POST">
        <div class="mb-3">
            <label class="form-label">Your VUID, Name, or “Name (Precinct)”</label>
            <input type="text" name="identifier" class="form-control form-control-lg" placeholder="e.g. 12345 or John Smith" required>
        </div>
        <div class="mb-3">
            <label class="form-label">Select Poll</label>
            <select name="poll_id" class="form-select form-select-lg" required>
                {% for pid, p in polls.items() %}
                <option value="{{ pid }}">{{ p.Title }}</option>
                {% endfor %}
            </select>
        </div>
        <div class="mb-3">
            <label class="form-label">Your Vote</label>
            <select name="option" class="form-select form-select-lg" required>
                <option value="For">For</option>
                <option value="Against">Against</option>
                <option value="Abstain">Abstain</option>
            </select>
        </div>
        <button type="submit" class="btn btn-success btn-lg w-100">Submit My Vote</button>
    </form>
</body>
</html>
